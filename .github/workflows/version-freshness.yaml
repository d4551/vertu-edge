name: Version Freshness

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  freshness:
    name: Online Version Freshness Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10
      - name: Check npm/CDN/Bun freshness (online)
        env:
          VERSION_FRESHNESS_MODE: online
        run: bun run scripts/check-version-freshness.ts
