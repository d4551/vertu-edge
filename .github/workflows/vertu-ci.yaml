name: Vertu CI

on:
  push:
    branches: ["main"]
    paths:
      - "Android/**"
      - "control-plane/**"
      - "vertu-core/**"
      - "vertu-android-rpa/**"
      - "tooling/vertu-flow-kit/**"
      - "iOS/**"
      - "contracts/**"
      - "scripts/**"
      - "docs/**"
      - ".github/workflows/vertu-ci.yaml"
  pull_request:
    branches: ["main"]
    paths:
      - "Android/**"
      - "control-plane/**"
      - "vertu-core/**"
      - "vertu-android-rpa/**"
      - "tooling/vertu-flow-kit/**"
      - "iOS/**"
      - "contracts/**"
      - "scripts/**"
      - "docs/**"
      - ".github/workflows/vertu-ci.yaml"
  workflow_dispatch:

jobs:
  android:
    name: Android Build + Unit Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Android/src
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Android assemble, lint, and test
        run: ./gradlew :app:assembleDebug :app:lintDebug :app:testDebugUnitTest :vertu-android-rpa:testDebugUnitTest

  kmp:
    name: KMP Contracts Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Android/src
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Run vertu-core JVM tests
        run: ./gradlew :vertu-core:jvmTest

  control-plane:
    name: Control Plane Typecheck + Smoke Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: control-plane
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run typecheck
      - name: Lint
        run: bun run lint
      - name: Test
        run: bun test
      - name: Capability audit
        run: bun run ../scripts/check-capability-gaps.ts
      - name: Code practice audit
        run: bun run ../scripts/check-code-practices.ts
      - name: Version freshness policy (offline)
        run: bun run ../scripts/check-version-freshness.ts
      - name: Docs consistency checks
        run: |
          grep -q '`POST /api/models/pull`' ../docs/FLOW_REFERENCE.md
          grep -q '`GET /api/models/pull/:jobId`' ../docs/FLOW_REFERENCE.md
          grep -q '`POST /api/apps/build`' ../docs/FLOW_REFERENCE.md
          grep -q '`GET /api/apps/build/:jobId`' ../docs/FLOW_REFERENCE.md
          grep -q '`POST /api/flows/validate`' ../docs/FLOW_REFERENCE.md
          grep -q '`POST /api/ai/providers/validate`' ../docs/FLOW_REFERENCE.md
          grep -qi 'iOS builds are unsupported on non-mac hosts' ../docs/FLOW_REFERENCE.md
      - name: Smoke test HTTP server
        run: bun src/cli.ts verify smoke-control-plane
        working-directory: tooling/vertu-flow-kit

  tooling:
    name: Flow Kit Typecheck + Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tooling/vertu-flow-kit
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run typecheck
      - name: Lint
        run: bun run lint
      - name: Test
        run: bun test

  ios:
    name: iOS Host Build + Swift Tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate Xcode host project
        run: ruby ./scripts/generate_ios_host_project.rb
      - name: Run swift tests
        working-directory: iOS/VertuEdge
        run: swift test
      - name: Build iOS host app
        run: ./scripts/run_ios_build.sh --platform=ios --build-type=debug --skip-tests

  device-ai-protocol:
    name: Device AI Protocol Gate (Android + iOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Install control-plane dependencies
        run: bun install --frozen-lockfile
        working-directory: control-plane
      - name: Install flow-kit dependencies
        run: bun install --frozen-lockfile
        working-directory: tooling/vertu-flow-kit
      - name: Install Hugging Face CLI
        run: |
          python3 -m pip install --user --upgrade huggingface_hub
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Run device AI protocol
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: ./scripts/run_device_ai_protocol.sh
      - name: Audit device readiness report
        run: bun src/cli.ts audit device-readiness
        working-directory: tooling/vertu-flow-kit
